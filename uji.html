<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Learning | SMPN 10 BANAWA SELATAN</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    
    <style>
        :root { 
            --primary: #1e3a8a; 
            --secondary: #3b82f6; 
            --accent: #f59e0b; 
        }

        body { background-color: #f1f5f9; font-family: 'Source Sans Pro', sans-serif; }

        /* --- Login Section --- */
        #login-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            display: flex; align-items: center; justify-content: center; padding: 15px;
        }
        .login-container {
            display: flex; width: 900px; max-width: 100%; background: #fff;
            border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .login-brand {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; width: 40%; padding: 40px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-form-area { width: 60%; padding: 45px; }
        .brand-logo-large { width: 80px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); }

        /* --- Content Styling --- */
        .materi-card { 
            border: none !important; border-radius: 18px !important; 
            transition: 0.3s; cursor: pointer; background: #fff; overflow: hidden;
        }
        .materi-card:hover { transform: translateY(-7px); box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; }
        
        /* Video Aspect Ratio */
        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
            border-radius: 12px; background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Document Styling */
        #doc-content img { 
            cursor: zoom-in; max-width: 100%; border-radius: 10px; 
            margin: 15px 0; transition: 0.3s; 
        }
        #doc-content img:hover { opacity: 0.9; }

        /* Responsivitas */
        @media (max-width: 768px) {
            .login-container { flex-direction: column; }
            .login-brand, .login-form-area { width: 100%; }
            .login-brand { padding: 30px; }
        }
    </style>
</head>
<body class="hold-transition layout-top-nav">

<div id="global-loader" class="d-none" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <div class="spinner-border text-primary mb-2"></div>
    <b>Memuat...</b>
</div>

<div id="login-page">
    <div class="login-container">
        <div class="login-brand">
            <div class="d-flex mb-3" style="gap:15px">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="brand-logo-large">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo-Tut-Wuri-Handayani-PNG-Warna.png" class="brand-logo-large">
            </div>
            <h3 class="font-weight-bold mb-0">E-LEARNING</h3>
            <p>SMP NEGERI 10 BANAWA SELATAN</p>
            <div style="width: 40px; height: 4px; background: var(--accent); border-radius: 2px; margin: 15px 0;"></div>
            <p class="small opacity-75">Sistem Informasi Pembelajaran Digital<br>Kabupaten Donggala</p>
        </div>
        <div class="login-form-area">
            <h4 class="font-weight-bold text-dark mb-1">Selamat Datang 👋</h4>
            <p class="text-muted mb-4">Masuk untuk mulai belajar.</p>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="user_nama" class="form-control form-control-lg" style="border-radius:12px" placeholder="Nama sesuai absen...">
            </div>
            <div class="form-group mb-4">
                <label>Pilih Kelas</label>
                <select id="user_kelas" class="form-control form-control-lg" style="border-radius:12px">
                    <option value="" disabled selected>Pilih Kelas...</option>
                    <option>VII (Tujuh)</option>
                    <option>VIII (Delapan)</option>
                    <option>IX (Sembilan)</option>
                </select>
            </div>
            <button class="btn btn-primary btn-block btn-lg shadow" style="border-radius:12px; font-weight:700" onclick="simpanIdentitas()">
                MULAI BELAJAR <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>
</div>

<div class="wrapper">
    <nav class="main-header navbar navbar-expand-md navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <span class="navbar-brand font-weight-bold text-primary">SMPN 10 BANAWA SELATAN</span>
            <div class="ml-auto d-flex align-items-center">
                <span class="badge badge-info p-2 px-3 mr-2" style="border-radius:20px">
                    <i class="fas fa-user-circle mr-1"></i> <span id="display-nama"></span> (<span id="display-kelas"></span>)
                </span>
                <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="logout()"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="container py-4">
            <div id="view-grid">
                <div class="text-center mb-4">
                    <h2 class="font-weight-bold">Materi Pembelajaran</h2>
                    <p class="text-muted">Pilih materi yang ingin kamu pelajari hari ini</p>
                </div>
                <div id="menu-grid" class="row">
                    </div>
            </div>

            <div id="view-content" class="d-none">
                <div class="card card-outline card-primary shadow-lg border-0" style="border-radius:20px; overflow:hidden">
                    <div class="card-header bg-white py-3 d-flex align-items-center">
                        <h4 class="card-title font-weight-bold text-primary mb-0" id="main-title"></h4>
                        <div class="ml-auto">
                            <button class="btn btn-light rounded-circle" onclick="backToGrid()"><i class="fas fa-times text-danger"></i></button>
                        </div>
                    </div>
                    <div class="card-body p-4" id="doc-content">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalGambar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-body text-center p-0">
                <img src="" id="img-zoom" class="img-fluid rounded shadow-lg">
                <div class="mt-3"><button class="btn btn-light rounded-pill px-4" data-dismiss="modal">Tutup</button></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalYoutube" tabindex="-1" data-backdrop="static" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content shadow-lg">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title font-weight-bold"><i class="fab fa-youtube mr-2"></i> Video Pembelajaran</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body p-0">
                <div class="video-container">
                    <iframe id="yt-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz208O4q2CBFA0vwJyGFanuAau8NmXVfumXpGi-iw5AWBP2t8HNl2Pj4FdOf4s5Jmv4YQ/exec"; 
    let allMateri = [], currentFilter = 'all';

    $(document).ready(function() {
        if (!localStorage.getItem('siswa_nama')) { $('#login-page').fadeIn(); } 
        else { updateUserDisplay(); fetchMenu(); }
    });

    function simpanIdentitas() {
        const n = $('#user_nama').val().trim(), k = $('#user_kelas').val();
        if(n && k) {
            localStorage.setItem('siswa_nama', n); localStorage.setItem('siswa_kelas', k);
            updateUserDisplay(); $('#login-page').fadeOut(); fetchMenu();
        } else { alert("Lengkapi data!"); }
    }

    function updateUserDisplay() { 
        $('#display-nama').html(`<i class="fas fa-user-circle mr-1"></i> ${localStorage.getItem('siswa_nama')}`); 
    }

    function logout() { if(confirm("Keluar aplikasi?")) { localStorage.clear(); location.reload(); } }

    async function fetchMenu() {
        $('#global-loader').removeClass('d-none');
        try {
            const r = await fetch(SCRIPT_URL);
            const d = await r.json();
            allMateri = d.menu || [];
            applyFilters();
        } catch (e) { alert("Gagal menyambung server."); } finally { $('#global-loader').addClass('d-none'); }
    }

    function filterType(type) {
        currentFilter = type;
        $('#tab-filter .nav-link').removeClass('active');
        $(`button[onclick="filterType('${type}')"]`).addClass('active');
        applyFilters();
    }

    function applyFilters() {
        const s = $('#search-materi').val().toLowerCase();
        let f = allMateri;
        if (currentFilter !== 'all') f = f.filter(m => m.type === currentFilter);
        if (s) f = f.filter(m => m.name.toLowerCase().includes(s));
        renderCards(f);
    }

    function renderCards(list) {
        const grid = $('#view-grid').empty();
        if(!list.length) { grid.append('<div class="col-12 text-center py-5">Materi tidak ditemukan.</div>'); return; }
        list.forEach(m => {
            let icon = `<i class="fas fa-file-word text-primary fa-3x"></i>`;
            if(m.type === 'video') icon = `<i class="fas fa-play-circle text-purple fa-3x" style="color:#a855f7"></i>`;
            if(m.type === 'pdf') icon = `<i class="fas fa-file-pdf text-danger fa-3x"></i>`;
            if(m.type === 'ppt') icon = `<i class="fas fa-file-powerpoint text-warning fa-3x"></i>`;
            if(m.type === 'image') icon = `<i class="fas fa-image text-success fa-3x"></i>`;

            grid.append(`
                <div class="col-lg-3 col-md-4 col-6 mb-4">
                    <div class="card materi-card shadow-sm h-100" onclick="openMateri('${m.id}', '${m.name}')">
                        <div class="card-icon-area">${icon}</div>
                        <div class="card-body p-3 text-center">
                            <p class="font-weight-bold mb-1 small text-dark">${m.name}</p>
                            <span class="badge badge-light border text-uppercase" style="font-size:9px">${m.type}</span>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    async function openMateri(id, judul) {
        $('#global-loader').removeClass('d-none');
        const n = localStorage.getItem('siswa_nama'), k = localStorage.getItem('siswa_kelas');
        
        try {
            const r = await fetch(`${SCRIPT_URL}?id=${id}`);
            const d = await r.json();
            
            // Log activity
            fetch(`${SCRIPT_URL}?action=log&nama=${encodeURIComponent(n)}&kelas=${encodeURIComponent(k)}&judul=${encodeURIComponent(judul)}&id=${id}&type=${d.type}`);

            $('#view-grid').addClass('d-none'); $('#view-content').removeClass('d-none');
            $('#main-title').text(judul);
            const area = $('#doc-content');

            if(d.type === 'video') {
                area.html(`<div class="p-3 p-md-5 bg-dark"><div class="video-wrapper"><iframe src="${d.content}" allow="autoplay; fullscreen"></iframe></div></div>`);
            } else if(d.type === 'image') {
                area.html(`<div class="text-center p-4 bg-light"><img src="${d.content}" class="img-fluid rounded shadow" style="max-height:70vh; cursor:zoom-in" onclick="showPopup('${d.content}', 'img')"></div>`);
                showPopup(d.content, 'img');
            } else if(d.type === 'doc') {
                area.html(`<div class="p-4 p-md-5 bg-white doc-rendered">${d.content}</div>`);
                processDocContent(); // Logika Scan Gambar & YT
            } else {
                area.html(`<iframe src="${d.content}" style="width:100%; height:750px; border:none;"></iframe>`);
            }
            window.scrollTo(0,0);
        } catch (e) { alert("File gagal dimuat."); } finally { $('#global-loader').addClass('d-none'); }
    }

    // Fungsi Scan Gambar dan Link Youtube di dalam Google Docs
    function processDocContent() {
        // 1. Gambar Bisa Zoom
        $('.doc-rendered img').each(function() {
            $(this).attr('onclick', `showPopup('${$(this).attr('src')}', 'img')`);
        });

        // 2. Link Youtube Jadi Tombol Pop-up
        $('.doc-rendered a').each(function() {
            const url = $(this).attr('href');
            if (url && (url.includes('youtube.com') || url.includes('youtu.be'))) {
                let videoId = "";
                if(url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
                else videoId = url.split('/').pop();

                $(this).after(`<br><a href="javascript:void(0)" class="yt-link-btn" onclick="showPopup('${videoId}', 'yt')"><i class="fab fa-youtube"></i> Putar Video: ${$(this).text()}</a>`);
                $(this).hide(); // Sembunyikan link aslinya
            }
        });
    }

    function showPopup(content, type) { 
        const body = $('#media-body');
        body.empty();

        if(type === 'img') {
            body.html(`<img src="${content}" class="img-fluid" style="max-height:85vh">`);
        } else if(type === 'yt') {
            body.html(`<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${content}?autoplay=1" allow="autoplay; fullscreen"></iframe></div>`);
        }
        
        $('#mediaModal').modal('show'); 
    }

    // Stop video saat modal ditutup
    $('#mediaModal').on('hidden.bs.modal', function () {
        $('#media-body').empty();
    });

    function backToGrid() { $('#view-content').addClass('d-none'); $('#view-grid').removeClass('d-none'); }
</script>

</body>
</html>
